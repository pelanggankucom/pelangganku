name: Deploy to Rumahweb

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOKU_CLIENT_ID: ${{ secrets.DOKU_CLIENT_ID }}
          DOKU_API_KEY: ${{ secrets.DOKU_API_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          envs: DOKU_CLIENT_ID,DOKU_API_KEY
          script: |
            set -e
            PHP=/usr/local/bin/ea-php82
            COMPOSER=$HOME/bin/composer
            cd ~/laravel/pelangganku
            git pull origin main
            $PHP $COMPOSER install --no-dev --optimize-autoloader --no-interaction --no-scripts
            $PHP artisan package:discover --ansi
            $PHP artisan migrate --force
            # Tulis/perbarui env vars DOKU hanya jika secret-nya ada (non-empty)
            if [ -n "$DOKU_CLIENT_ID" ]; then
              grep -q "^DOKU_CLIENT_ID=" .env \
                && sed -i "s|^DOKU_CLIENT_ID=.*|DOKU_CLIENT_ID=${DOKU_CLIENT_ID}|" .env \
                || echo "DOKU_CLIENT_ID=${DOKU_CLIENT_ID}" >> .env
              grep -q "^DOKU_API_KEY=" .env \
                && sed -i "s|^DOKU_API_KEY=.*|DOKU_API_KEY=${DOKU_API_KEY}|" .env \
                || echo "DOKU_API_KEY=${DOKU_API_KEY}" >> .env
              grep -q "^DOKU_SANDBOX=" .env || echo "DOKU_SANDBOX=false" >> .env
            fi
            $PHP artisan config:cache
            $PHP artisan route:cache
            $PHP artisan view:cache
            $PHP artisan storage:link 2>/dev/null || true
