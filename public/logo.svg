<svg viewBox="0 0 240 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003DA5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001F5C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Star (top right) -->
  <g transform="translate(180, 40)">
    <path d="M 0,-18 L 5,-4 L 20,-1 L 9,8 L 12,23 L 0,14 L -12,23 L -9,8 L -20,-1 L -5,-4 Z" fill="url(#goldGradient)" />
  </g>

  <!-- P letter - main vertical bar -->
  <rect x="35" y="30" width="28" height="210" rx="14" fill="url(#blueGradient)" />

  <!-- P letter - top curve -->
  <path d="M 63,30 Q 130,30 145,70 Q 155,100 130,125 Q 105,145 63,145 L 63,30 Z" fill="url(#blueGradient)" />

  <!-- Smiley face on P -->
  <!-- Head (golden circle) -->
  <circle cx="100" cy="140" r="48" fill="url(#goldGradient)" stroke="none"/>

  <!-- Left eye white -->
  <circle cx="78" cy="120" r="8" fill="white" stroke="none"/>
  <!-- Right eye white -->
  <circle cx="122" cy="120" r="8" fill="white" stroke="none"/>

  <!-- Left eye pupil -->
  <circle cx="78" cy="120" r="4" fill="#001F5C" stroke="none"/>
  <!-- Right eye pupil -->
  <circle cx="122" cy="120" r="4" fill="#001F5C" stroke="none"/>

  <!-- Smile -->
  <path d="M 75,155 Q 100,175 125,155" stroke="white" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
